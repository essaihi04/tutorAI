# =============================================================
# Moalim Analytics — config Nginx ISOLÉE
# Chemin : /etc/nginx/conf.d/moalim-analytics.conf
# Sous-domaine : analytics.moalim.online
# Reverse proxy vers le container Umami (127.0.0.1:3001)
# =============================================================

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name analytics.moalim.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS principal ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name analytics.moalim.online;

    ssl_certificate     /etc/letsencrypt/live/analytics.moalim.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/analytics.moalim.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Headers CORS pour permettre au script de tracker depuis moalim.online
    add_header Access-Control-Allow-Origin "https://moalim.online" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    client_max_body_size 5M;

    # Reverse proxy → container Umami
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Evite la duplication : on masque les headers CORS envoyes par Umami
        # (qui repond Access-Control-Allow-Origin: *) et on laisse nginx gerer.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        # Preflight OPTIONS : reponse directe par nginx
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://moalim.online" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Cache long sur le script de tracking
    location /script.js {
        proxy_pass http://127.0.0.1:3001/script.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 256;
}
