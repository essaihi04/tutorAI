# =============================================================
# Moalim — config Nginx ISOLÉE
# Chemin : /etc/nginx/conf.d/moalim.conf
# Ne route que les requêtes sur moalim.online / www.moalim.online.
# Toute autre app (ba9alino, etc.) reste totalement intacte.
# =============================================================

upstream moalim_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect (uniquement pour moalim.online) ──
server {
    listen 80;
    listen [::]:80;
    server_name moalim.online www.moalim.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS principal ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name moalim.online www.moalim.online;

    ssl_certificate     /etc/letsencrypt/live/moalim.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moalim.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25M;

    # Frontend statique servi exclusivement depuis /var/www/moalim
    root /var/www/moalim;
    index index.html;

    # Cache long sur les assets hashés Vite
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API REST → backend isolé sur 127.0.0.1:8000
    location /api/ {
        proxy_pass http://moalim_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /health {
        proxy_pass http://moalim_backend/health;
        access_log off;
    }

    # Static exam assets servis par FastAPI
    location /static/ {
        proxy_pass http://moalim_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # WebSocket — pipeline voix temps-réel
    location /ws/ {
        proxy_pass http://moalim_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
}
