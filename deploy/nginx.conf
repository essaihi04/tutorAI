# =============================================================
# Nginx config for moalim.online (Moalim AI Tutor)
# Place at /etc/nginx/sites-available/moalim
# Then: ln -s /etc/nginx/sites-available/moalim /etc/nginx/sites-enabled/
# =============================================================

# Upstream FastAPI backend (uvicorn)
upstream moalim_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name moalim.online www.moalim.online;

    # ACME challenge for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name moalim.online www.moalim.online;

    # SSL certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/moalim.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moalim.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Body size — allow image uploads (whiteboard/exam answers)
    client_max_body_size 25M;

    # Frontend static (Vite build copied here)
    root /var/www/moalim;
    index index.html;

    # Long cache on hashed assets, no cache on index.html
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Backend REST API ──
    location /api/ {
        proxy_pass http://moalim_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Backend health check ──
    location = /health {
        proxy_pass http://moalim_backend/health;
        access_log off;
    }

    # ── Static exam assets served by FastAPI ──
    location /static/ {
        proxy_pass http://moalim_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── WebSocket (voice tutor pipeline) ──
    location /ws/ {
        proxy_pass http://moalim_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket needs long timeouts (no idle close during a session)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ── SPA fallback — every other route serves index.html ──
    location / {
        try_files $uri $uri/ /index.html;
        # Always-fresh index for SPA deployments
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
}
