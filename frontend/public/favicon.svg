<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Moalim">
  <defs>
    <linearGradient id="moalimGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset=".55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="moalimShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background with subtle top shine -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#moalimGrad)"/>
  <rect width="64" height="32" rx="14" ry="14" fill="url(#moalimShine)"/>

  <!-- Stylised "M" — bold, modern, crisp -->
  <path d="M13 47 V19 L32 37 L51 19 V47"
        stroke="#ffffff" stroke-width="5.5"
        fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AI spark (top-right) to hint at the smart-tutor angle -->
  <circle cx="50" cy="15" r="3.5" fill="#fbbf24"/>
  <circle cx="50" cy="15" r="1.3" fill="#ffffff"/>
</svg>
