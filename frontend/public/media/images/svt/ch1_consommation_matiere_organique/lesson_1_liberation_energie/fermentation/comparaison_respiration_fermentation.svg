<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="600" y="60" text-anchor="middle" font-size="34" font-family="Arial" fill="#0f172a">Respiration vs Fermentation</text>
  <rect x="120" y="130" width="430" height="430" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <rect x="650" y="130" width="430" height="430" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
  <text x="335" y="190" text-anchor="middle" font-size="28" font-family="Arial" fill="#14532d">Respiration</text>
  <text x="865" y="190" text-anchor="middle" font-size="28" font-family="Arial" fill="#7f1d1d">Fermentation</text>
  <text x="170" y="260" font-size="22" font-family="Arial" fill="#14532d">- Avec O2</text>
  <text x="170" y="310" font-size="22" font-family="Arial" fill="#14532d">- Mitochondrie</text>
  <text x="170" y="360" font-size="22" font-family="Arial" fill="#14532d">- Oxydation complète</text>
  <text x="170" y="410" font-size="22" font-family="Arial" fill="#14532d">- 36 à 38 ATP</text>
  <text x="700" y="260" font-size="22" font-family="Arial" fill="#7f1d1d">- Sans O2</text>
  <text x="700" y="310" font-size="22" font-family="Arial" fill="#7f1d1d">- Cytoplasme</text>
  <text x="700" y="360" font-size="22" font-family="Arial" fill="#7f1d1d">- Oxydation incomplète</text>
  <text x="700" y="410" font-size="22" font-family="Arial" fill="#7f1d1d">- 2 ATP</text>
</svg>
