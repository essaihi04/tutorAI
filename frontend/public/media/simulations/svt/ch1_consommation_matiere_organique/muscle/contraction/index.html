<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contraction musculaire</title>
  <style>body{font-family:Arial,sans-serif;padding:24px;background:#f8fafc}.track{width:100%;max-width:700px;height:80px;background:#dbeafe;border-radius:40px;position:relative;overflow:hidden}.bar{position:absolute;left:0;top:10px;height:60px;width:60%;background:#2563eb;border-radius:30px;transition:width .5s ease}</style>
</head>
<body>
  <h1>Animation de la contraction musculaire</h1>
  <p>Clique pour simuler le glissement des filaments.</p>
  <button onclick="contract()">Contracter</button>
  <button onclick="relax()">Relâcher</button>
  <div class="track"><div id="bar" class="bar"></div></div>
  <p id="info">Le sarcomère est au repos.</p>
  <script>
    function contract(){document.getElementById('bar').style.width='35%';document.getElementById('info').textContent='Contraction : glissement actine-myosine avec consommation d\'ATP.'}
    function relax(){document.getElementById('bar').style.width='60%';document.getElementById('info').textContent='Relâchement du sarcomère.'}
  </script>
</body>
</html>
