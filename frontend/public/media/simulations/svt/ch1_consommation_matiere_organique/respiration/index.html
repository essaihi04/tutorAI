<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulation respiration cellulaire</title>
  <style>body{font-family:Arial,sans-serif;padding:24px;background:#f8fafc}button{padding:10px 16px;margin:8px}#out{margin-top:20px;padding:16px;background:#fff;border-radius:12px}</style>
</head>
<body>
  <h1>Simulation respiration cellulaire</h1>
  <p>Choisis la présence de dioxygène pour observer le rendement énergétique.</p>
  <button onclick="simulate(true)">Avec O2</button>
  <button onclick="simulate(false)">Sans O2</button>
  <div id="out">Résultat affiché ici.</div>
  <script>
    function simulate(withO2){
      document.getElementById('out').innerHTML = withO2
        ? '<strong>Respiration cellulaire</strong><br/>Lieu : mitochondrie<br/>Bilan : 36 à 38 ATP'
        : '<strong>Pas de respiration complète</strong><br/>Sans O2, la cellule bascule vers une voie fermentaire avec 2 ATP';
    }
  </script>
</body>
</html>
