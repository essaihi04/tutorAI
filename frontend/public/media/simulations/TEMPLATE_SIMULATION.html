<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VOTRE_TITRE_ICI</title>
  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       LAYOUT — 100vh, ZÉRO DÉFILEMENT
       La simulation doit TOUJOURS tenir dans l'écran sans scroll.
       Utiliser vh/vw, flex, grid. JAMAIS de hauteurs fixes en px.
       ═══════════════════════════════════════════════════════════════════════ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100vh; width: 100vw;
      overflow: hidden;            /* ← interdit le scroll */
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    body {
      display: flex; flex-direction: column;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #1f2937;
    }

    /* ── En-tête compact ─────────────────────────────────────────────── */
    header {
      flex: 0 0 auto;
      padding: 0.6rem 1rem;
      background: rgba(255,255,255,0.95);
      border-bottom: 2px solid #e5e7eb;
      display: flex; align-items: center; gap: 0.5rem;
    }
    header h1 {
      font-size: clamp(0.85rem, 2.2vw, 1.15rem);
      font-weight: 700; color: #1e3a5f;
    }
    header .badge {
      font-size: 0.7rem; padding: 2px 8px;
      background: #dbeafe; color: #1d4ed8;
      border-radius: 999px; font-weight: 600;
    }

    /* ── Zone principale — prend TOUT l'espace restant ────────────── */
    main {
      flex: 1 1 auto;
      display: flex; flex-direction: column;
      padding: 0.6rem;
      gap: 0.5rem;
      min-height: 0;               /* ← crucial pour flex shrink */
    }

    /* ── Barre de contrôle (boutons) ─────────────────────────────── */
    .controls {
      flex: 0 0 auto;
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      justify-content: center;
    }
    .controls button {
      flex: 1 1 0; min-width: 100px; max-width: 220px;
      padding: 0.55rem 0.8rem;
      font-size: clamp(0.75rem, 1.8vw, 0.95rem);
      font-weight: 600; border: none; border-radius: 10px;
      cursor: pointer; transition: all 0.25s;
      color: #fff; letter-spacing: 0.02em;
    }
    .controls button:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .controls button:active { transform: translateY(0); }
    .controls button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    /* Couleurs prédéfinies — ajouter les vôtres */
    .btn-primary   { background: #2563eb; }
    .btn-success   { background: #16a34a; }
    .btn-danger    { background: #dc2626; }
    .btn-warning   { background: #d97706; }
    .btn-secondary { background: #6b7280; }

    /* ── Zone de résultat / visualisation — flexible ────────────── */
    .result-area {
      flex: 1 1 auto;
      min-height: 0;               /* ← permet le shrink */
      background: rgba(255,255,255,0.95);
      border-radius: 14px;
      padding: 0.8rem;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.4rem;
      overflow: hidden;            /* ← jamais de scroll interne */
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .result-area .big-number {
      font-size: clamp(1.8rem, 6vw, 3.5rem);
      font-weight: 800; line-height: 1;
    }
    .result-area .label {
      font-size: clamp(0.7rem, 1.6vw, 0.9rem);
      color: #6b7280; font-weight: 500;
    }

    /* ── Rangée d'indicateurs en bas ─────────────────────────────── */
    .stats-row {
      flex: 0 0 auto;
      display: flex; gap: 0.4rem; flex-wrap: wrap;
      justify-content: center;
    }
    .stat-card {
      flex: 1 1 0; min-width: 90px; max-width: 200px;
      background: rgba(255,255,255,0.92);
      border-radius: 10px; padding: 0.45rem 0.6rem;
      text-align: center;
      border-left: 3px solid #3b82f6;
    }
    .stat-card .stat-label { font-size: 0.65rem; color: #6b7280; font-weight: 600; text-transform: uppercase; }
    .stat-card .stat-value { font-size: clamp(0.85rem, 2vw, 1.1rem); font-weight: 700; color: #1e3a5f; }

    /* ── Pied de page discret ────────────────────────────────────── */
    footer {
      flex: 0 0 auto;
      padding: 0.3rem 1rem;
      text-align: center;
      font-size: 0.6rem; color: rgba(255,255,255,0.6);
    }

    /* ── Animations ──────────────────────────────────────────────── */
    @keyframes fadeIn  { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeOut { from { opacity:1; } to { opacity:0; } }
    @keyframes pulse   { 0%,100% { transform:scale(1); } 50% { transform:scale(1.06); box-shadow:0 0 16px rgba(59,130,246,0.4); } }
    @keyframes pop     { 0% { transform:scale(0.8); opacity:0; } 100% { transform:scale(1); opacity:1; } }
    .anim-pop { animation: pop 0.35s ease-out; }
  </style>
</head>

<body>
  <!-- ═══════════════════════════════════════════════════════════════════
       HTML — PERSONNALISER CETTE PARTIE
       ═══════════════════════════════════════════════════════════════════ -->

  <header>
    <h1>🔬 Titre de la Simulation</h1>
    <span class="badge" id="variant-badge">Variante 1</span>
  </header>

  <main>
    <!-- BOUTONS — L'IA clique dessus via set_variant / start -->
    <div class="controls" id="controls">
      <button class="btn-success" onclick="runVariant('variant_1')">✅ Variante 1</button>
      <button class="btn-danger"  onclick="runVariant('variant_2')">❌ Variante 2</button>
      <!-- Ajouter autant de boutons que de variantes -->
    </div>

    <!-- ZONE DE RÉSULTAT — S'adapte à l'espace restant -->
    <div class="result-area" id="result">
      <p class="label">Clique sur un bouton ou attends que l'IA démarre</p>
    </div>

    <!-- INDICATEURS EN BAS -->
    <div class="stats-row" id="stats">
      <!-- Remplis dynamiquement par displayResult() -->
    </div>
  </main>

  <footer>Simulation IA-guidée — ne pas défiler</footer>

  <script>
  // ══════════════════════════════════════════════════════════════════════
  //  1. CONFIGURATION — OBLIGATOIRE À REMPLIR
  // ══════════════════════════════════════════════════════════════════════

  const SIMULATION_CONFIG = {
    // ┌─────────────────────────────────────────────────────────────────┐
    // │  id : identifiant unique, snake_case, PAS d'espaces            │
    // │       C'est CE QUE LE BACKEND UTILISE pour identifier la sim   │
    // │       Ex: 'respiration_energie', 'mitose_cellulaire'           │
    // └─────────────────────────────────────────────────────────────────┘
    id: 'VOTRE_ID_ICI',

    // Liste des variantes que l'IA va parcourir dans l'ordre.
    // Chaque variante a un id, un label (affiché), et des params
    // que le backend envoie via la commande « set_variant ».
    variants: [
      { id: 'variant_1', label: 'Variante 1 — description courte', params: { /* clés/valeurs */ } },
      { id: 'variant_2', label: 'Variante 2 — description courte', params: { /* clés/valeurs */ } },
      // Ajouter d'autres variantes si nécessaire
    ],

    // Objectifs pédagogiques (utilisés par le LLM pour l'évaluation)
    objectives: [
      'Objectif 1',
      'Objectif 2',
    ]
  };

  // ══════════════════════════════════════════════════════════════════════
  //  2. ÉTAT INTERNE — NE PAS RENOMMER ces champs
  // ══════════════════════════════════════════════════════════════════════

  const state = {
    actions: [],          // historique : ['start_simulation', 'set_variant_1', 'finish_simulation', ...]
    currentVariant: null, // id de la variante en cours
    currentState: {},     // données observables (ce que l'élève voit)
    simulationStatus: 'idle',  // idle | running | finished
    variantsCompleted: [],     // ['variant_1', 'variant_2', ...]
  };

  // ══════════════════════════════════════════════════════════════════════
  //  3. COMMUNICATION AVEC LE BACKEND — NE PAS MODIFIER
  // ══════════════════════════════════════════════════════════════════════

  function sendStateToAI() {
    const progress = state.variantsCompleted.length / Math.max(SIMULATION_CONFIG.variants.length, 1);
    const message = {
      type: 'simulation_state',
      simulation_id: SIMULATION_CONFIG.id,
      student_actions: state.actions,
      current_state: {
        ...state.currentState,
        simulation_status: state.simulationStatus,
        current_variant: state.currentVariant,
        variants_completed: state.variantsCompleted,
      },
      objective_progress: progress,
      timestamp: Date.now()
    };
    window.parent.postMessage(message, '*');
    console.log('[Sim:' + SIMULATION_CONFIG.id + '] ' + (state.actions[state.actions.length-1] || 'state'), message);
  }

  // ══════════════════════════════════════════════════════════════════════
  //  4. COMMANDES IA — Le backend appelle ces commandes
  //     Commandes standard que le backend connaît :
  //       start        → démarre la 1ère variante
  //       set_variant  → params.variant_id  → lance une variante précise
  //       reset        → remet à zéro
  //     Vous pouvez ajouter vos propres commandes.
  // ══════════════════════════════════════════════════════════════════════

  window.addEventListener('message', (event) => {
    const d = event.data;
    if (d && d.type === 'simulation_control' && d.simulation_id === SIMULATION_CONFIG.id) {
      console.log('[IA→Sim] Commande:', d.command, d.parameters);
      if (d.guidance_text) showGuidance(d.guidance_text);
      executeAICommand(d.command, d.parameters || {});
    }
  });

  function executeAICommand(command, params) {
    switch (command) {
      case 'start':
        // Démarrer la première variante
        runVariant(SIMULATION_CONFIG.variants[0].id);
        break;

      case 'set_variant':
        // L'IA demande de lancer une variante précise
        runVariant(params.variant_id);
        break;

      case 'set_oxygen':
        // Rétro-compatibilité respiration : oxygen_present → variant
        if (params.oxygen_present === true || params.oxygen_present === 'true') {
          runVariant(SIMULATION_CONFIG.variants[0].id);
        } else {
          runVariant(SIMULATION_CONFIG.variants.length > 1
            ? SIMULATION_CONFIG.variants[1].id
            : SIMULATION_CONFIG.variants[0].id);
        }
        break;

      case 'reset':
        resetSimulation();
        break;

      case 'call_function':
        // Générique : appeler une fonction globale
        const fn = params.name || params.function_name;
        let args = params.args || [];
        if (typeof args === 'string') { try { args = JSON.parse(args); } catch(e) { args = [args]; } }
        if (!Array.isArray(args)) args = [args];
        if (fn && typeof window[fn] === 'function') window[fn].apply(null, args);
        break;

      default:
        console.warn('[Sim] Commande inconnue:', command);
    }
  }

  // ══════════════════════════════════════════════════════════════════════
  //  5. LOGIQUE DE SIMULATION — À PERSONNALISER
  //     runVariant() est la SEULE fonction que vous DEVEZ implémenter.
  //     Elle reçoit l'id d'une variante et doit :
  //       a) calculer le résultat
  //       b) appeler displayResult(data) pour afficher
  //       c) NE PAS appeler sendStateToAI() — c'est fait automatiquement
  // ══════════════════════════════════════════════════════════════════════

  function runVariant(variantId) {
    const variant = SIMULATION_CONFIG.variants.find(v => v.id === variantId);
    if (!variant) { console.warn('[Sim] Variante inconnue:', variantId); return; }

    // ── Phase « running » ──
    state.currentVariant = variantId;
    state.simulationStatus = 'running';
    state.actions.push('start_simulation');
    sendStateToAI();

    // Mettre à jour le badge
    document.getElementById('variant-badge').textContent = variant.label;

    // ┌────────────────────────────────────────────────────────────────┐
    // │  PERSONNALISER ICI : calcul du résultat selon la variante     │
    // │  Remplacer le switch par votre propre logique.                 │
    // └────────────────────────────────────────────────────────────────┘
    let result = {};

    switch (variantId) {
      case 'variant_1':
        result = {
          title: '✅ Résultat Variante 1',
          bigNumber: '36',
          bigUnit: 'ATP',
          bigColor: '#16a34a',
          stats: [
            { label: 'Lieu', value: 'Mitochondrie' },
            { label: 'Voie', value: 'Respiration aérobie' },
            { label: 'Étapes', value: 'Glycolyse → Krebs → Chaîne resp.' },
          ]
        };
        break;

      case 'variant_2':
        result = {
          title: '❌ Résultat Variante 2',
          bigNumber: '2',
          bigUnit: 'ATP',
          bigColor: '#dc2626',
          stats: [
            { label: 'Lieu', value: 'Cytoplasme' },
            { label: 'Voie', value: 'Fermentation' },
            { label: 'Étapes', value: 'Glycolyse seule' },
          ]
        };
        break;

      default:
        result = { title: variantId, bigNumber: '?', bigUnit: '', bigColor: '#6b7280', stats: [] };
    }

    // ── Afficher le résultat (avec un léger délai pour l'animation) ──
    setTimeout(() => {
      displayResult(result);
      finishVariant(variantId, result);
    }, 600);
  }

  // ══════════════════════════════════════════════════════════════════════
  //  6. AFFICHAGE — GÉNÉRIQUE, fonctionne pour toute simulation
  // ══════════════════════════════════════════════════════════════════════

  function displayResult(data) {
    // Zone principale
    const el = document.getElementById('result');
    el.innerHTML = '';
    if (data.title) {
      const h = document.createElement('div');
      h.className = 'label'; h.textContent = data.title;
      el.appendChild(h);
    }
    if (data.bigNumber != null) {
      const n = document.createElement('div');
      n.className = 'big-number anim-pop';
      n.style.color = data.bigColor || '#1e3a5f';
      n.textContent = data.bigNumber + (data.bigUnit ? ' ' + data.bigUnit : '');
      el.appendChild(n);
    }

    // Indicateurs en bas
    const statsEl = document.getElementById('stats');
    statsEl.innerHTML = '';
    (data.stats || []).forEach(s => {
      const card = document.createElement('div');
      card.className = 'stat-card anim-pop';
      card.innerHTML = '<div class="stat-label">' + s.label + '</div>'
                     + '<div class="stat-value">' + s.value + '</div>';
      statsEl.appendChild(card);
    });
  }

  // ══════════════════════════════════════════════════════════════════════
  //  7. FIN D'UNE VARIANTE — signale « finished » au backend
  //     Le backend attend simulation_status='finished' pour interpréter.
  // ══════════════════════════════════════════════════════════════════════

  function finishVariant(variantId, result) {
    state.simulationStatus = 'finished';
    state.currentState = {
      variant_id: variantId,
      ...result,
      stats: undefined,  // pas besoin de renvoyer le HTML
    };
    // Copier les stats comme clés individuelles pour le LLM
    (result.stats || []).forEach(s => {
      state.currentState[s.label.toLowerCase().replace(/\s+/g, '_')] = s.value;
    });

    if (!state.variantsCompleted.includes(variantId)) {
      state.variantsCompleted.push(variantId);
    }
    state.actions.push('finish_simulation');
    sendStateToAI();
  }

  // ══════════════════════════════════════════════════════════════════════
  //  8. RESET
  // ══════════════════════════════════════════════════════════════════════

  function resetSimulation() {
    state.actions = [];
    state.currentVariant = null;
    state.currentState = {};
    state.simulationStatus = 'idle';
    state.variantsCompleted = [];

    document.getElementById('result').innerHTML =
      '<p class="label">Simulation réinitialisée — en attente</p>';
    document.getElementById('stats').innerHTML = '';
    document.getElementById('variant-badge').textContent = '—';
  }

  // ══════════════════════════════════════════════════════════════════════
  //  9. UTILITAIRES — guidage IA & mise en évidence
  // ══════════════════════════════════════════════════════════════════════

  function showGuidance(text) {
    if (!text) return;
    const old = document.getElementById('ai-guidance-msg');
    if (old) old.remove();
    const el = document.createElement('div');
    el.id = 'ai-guidance-msg';
    el.style.cssText = 'position:fixed;top:8px;left:50%;transform:translateX(-50%);'
      + 'background:#1d4ed8;color:#fff;padding:8px 16px;border-radius:8px;'
      + 'box-shadow:0 4px 12px rgba(0,0,0,.25);z-index:9999;max-width:88%;'
      + 'text-align:center;font-size:0.82rem;font-weight:500;animation:fadeIn .3s ease;';
    el.textContent = text;
    document.body.appendChild(el);
    setTimeout(() => { el.style.animation = 'fadeOut .3s ease'; setTimeout(() => el.remove(), 300); }, 4500);
  }

  function highlightElement(id) {
    const el = document.getElementById(id) || document.querySelector(id);
    if (el) { el.style.animation = 'pulse 1s ease-in-out 3'; setTimeout(() => el.style.animation = '', 3100); }
  }

  // ══════════════════════════════════════════════════════════════════════
  //  10. INIT
  // ══════════════════════════════════════════════════════════════════════

  console.log('[Sim] Prête:', SIMULATION_CONFIG.id, '| Variantes:', SIMULATION_CONFIG.variants.length);
  </script>
</body>
</html>
