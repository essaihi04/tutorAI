# Programme SVT 2Bac PC - Maroc
# Structure intelligente pour agent IA

curriculum_info:
  level: "2ème Baccalauréat"
  branch: "Sciences Physiques et Chimiques (PC)"
  subject: "Sciences de la Vie et de la Terre (SVT)"
  country: "Maroc"
  total_chapters: 4

# Chapitres du programme
chapters:
  
  # CHAPITRE 1 - Semestre 1
  - id: "ch1_consommation_matiere"
    order: 1
    semester: 1
    title: "Consommation de la matière organique et flux d'énergie"
    duration_hours: 18
    exam_weight: 25
    difficulty: "intermediate"
    
    key_concepts:
      - "Glycolyse"
      - "Respiration cellulaire"
      - "Fermentation"
      - "ATP"
      - "Mitochondrie"
      - "Cycle de Krebs"
      - "Contraction musculaire"
    
    lessons:
      - id: "lesson_1_1"
        title: "Libération de l'énergie emmagasinée"
        objectives:
          - "Comprendre le rôle de l'ATP"
          - "Décrire la glycolyse (2 ATP)"
          - "Expliquer la respiration aérobie (36-38 ATP)"
          - "Comparer respiration et fermentation"
        
        teaching_tips:
          activation: "Pourquoi la fatigue après un effort?"
          exploration: "Simulation respiration avec/sans O2"
          explanation: "Schémas des 3 étapes métaboliques"
          application: "Calculer bilans énergétiques"
      
      - id: "lesson_1_2"
        title: "Rôle du muscle strié squelettique"
        objectives:
          - "Structure du muscle (sarcomère)"
          - "Mécanisme de contraction (actine-myosine)"
          - "Sources d'énergie selon l'effort"

  # CHAPITRE 2 - Semestre 1
  - id: "ch2_information_genetique"
    order: 2
    semester: 1
    title: "Information génétique et reproduction"
    duration_hours: 20
    exam_weight: 30
    difficulty: "advanced"
    
    key_concepts:
      - "ADN"
      - "Réplication"
      - "Transcription"
      - "Traduction"
      - "Mitose"
      - "Méiose"
      - "Brassage génétique"
    
    lessons:
      - id: "lesson_2_1"
        title: "Notion de l'information génétique"
        objectives:
          - "Structure ADN (Watson-Crick)"
          - "Réplication semi-conservative"
          - "Mitose (2 cellules 2n identiques)"
      
      - id: "lesson_2_2"
        title: "Expression du matériel génétique"
        objectives:
          - "Transcription ADN→ARNm"
          - "Traduction ARNm→Protéine"
          - "Code génétique universel"
      
      - id: "lesson_2_3"
        title: "Transfert lors de la reproduction"
        objectives:
          - "Méiose (4 cellules n différentes)"
          - "Brassage intra/interchromosomique"
          - "Diversité génétique"

  # CHAPITRE 3 - Semestre 2
  - id: "ch3_utilisation_matieres"
    order: 3
    semester: 2
    title: "Utilisation des matières organiques/inorganiques"
    duration_hours: 12
    exam_weight: 20
    difficulty: "beginner"
    
    key_concepts:
      - "Ordures ménagères"
      - "Recyclage"
      - "Pollution"
      - "Énergies renouvelables"
      - "Radioactivité"
    
    lessons:
      - id: "lesson_3_1"
        title: "Ordures ménagères"
      - id: "lesson_3_2"
        title: "Pollution des milieux"
      - id: "lesson_3_3"
        title: "Matières radioactives"

  # CHAPITRE 4 - Semestre 2
  - id: "ch4_geologie"
    order: 4
    semester: 2
    title: "Phénomènes géologiques et chaînes de montagnes"
    duration_hours: 16
    exam_weight: 25
    difficulty: "advanced"
    
    key_concepts:
      - "Tectonique des plaques"
      - "Subduction"
      - "Collision"
      - "Métamorphisme"
      - "Granitisation"
    
    lessons:
      - id: "lesson_4_1"
        title: "Chaînes de montagnes et tectonique"
      - id: "lesson_4_2"
        title: "Métamorphisme"
      - id: "lesson_4_3"
        title: "Granitisation"

# Stratégies pédagogiques pour l'IA
ai_teaching_strategies:
  
  phases:
    activation:
      duration: "5-10 min"
      actions:
        - "Question ouverte liée au quotidien"
        - "Rappel des prérequis"
        - "Situation-problème"
    
    exploration:
      duration: "15-20 min"
      actions:
        - "Simulation interactive"
        - "Observation guidée"
        - "Formulation d'hypothèses"
    
    explanation:
      duration: "20-30 min"
      actions:
        - "Structuration des concepts"
        - "Vocabulaire scientifique"
        - "Schémas fonctionnels"
    
    application:
      duration: "15-20 min"
      actions:
        - "Exercices progressifs"
        - "Situations nouvelles"
        - "Problèmes concrets"
    
    consolidation:
      duration: "10-15 min"
      actions:
        - "Synthèse des points clés"
        - "QCM rapide"
        - "Identification lacunes"
  
  common_errors:
    - error: "Confusion mitose/méiose"
      correction: "Tableau comparatif: 2 vs 4 cellules, 2n vs n"
    
    - error: "Glycolyse nécessite O2"
      correction: "Première étape commune, donc anaérobie"
    
    - error: "Transcription = Traduction"
      correction: "Transcription=copie, Traduction=changement langue"
  
  vocabulary_priority:
    - "ATP"
    - "Mitochondrie"
    - "Glycolyse"
    - "ADN/ARN"
    - "Mitose/Méiose"
    - "Métamorphisme"

# Structure examen national
exam_structure:
  duration_hours: 3
  total_points: 20
  sections:
    - type: "QCM"
      points: 4
      questions: 8
    - type: "QROC"
      points: 6
      questions: 3
    - type: "Exercice"
      points: 10
      questions: 2
